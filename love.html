<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Полиночки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        /* Контейнер для сердца и текста */
        .heart-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 1.2s infinite ease-in-out;
            z-index: 10;
        }

        /* Само сердце через SVG для идеальной четкости */
        .heart-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: #ff2a6d;
            filter: drop-shadow(0 0 20px #ff2a6d) drop-shadow(0 0 40px #ff2a6d);
        }

        /* Текст внутри сердца */
        .heart-text {
            position: relative;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 11;
            letter-spacing: 1px;
        }

        /* Анимация биения сердца */
        @keyframes pulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.15); }
            45% { transform: scale(1.05); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Стили для фоновых частиц */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="pinkboard"></canvas>

    <div class="heart-container">
        <!-- SVG Сердце -->
        <svg class="heart-svg" viewBox="0 0 32 29.6">
            <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
            c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
        </svg>
        <!-- Надпись -->
        <div class="heart-text">Полиночка</div>
    </div>

    <script>
        /* Скрипт для красивого эффекта вылетающих маленьких сердечек на фоне */
        const canvas = document.getElementById('pinkboard');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 8 + 2;
                this.speedY = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.y -= this.speedY;
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 42, 109, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
